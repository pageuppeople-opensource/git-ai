name: Sync upstream

on:
  schedule:
    - cron: '0 6 * * *'   # Daily 06:00 UTC
  workflow_dispatch:

# Note: SYNC_PAT (a PAT with repo + workflow scopes) is required because:
#   1. GITHUB_TOKEN cannot push branches/commits that modify .github/workflows/ files
#   2. Force-push to main requires a branch-protection bypass (configure in repo rulesets)
# Without SYNC_PAT the workflow will detect changes but create an issue instead of pushing.

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sync:
    name: Rebase PageUp patches on upstream
    runs-on: ubuntu-latest
    steps:

      - name: Checkout main (full history)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          # Use PAT so pushes can include workflow-file changes
          token: ${{ secrets.SYNC_PAT || secrets.GITHUB_TOKEN }}

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/git-ai-project/git-ai.git
          git fetch upstream main

      - name: Check for new upstream commits
        id: check
        run: |
          MERGE_BASE=$(git merge-base HEAD upstream/main)
          UPSTREAM_HEAD=$(git rev-parse upstream/main)
          if [ "$MERGE_BASE" = "$UPSTREAM_HEAD" ]; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Already up to date with upstream."
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
            COUNT=$(git rev-list "$MERGE_BASE".."upstream/main" --count)
            echo "commit_count=$COUNT" >> "$GITHUB_OUTPUT"
            PATCH_COUNT=$(git rev-list "$MERGE_BASE"..HEAD --count)
            echo "patch_count=$PATCH_COUNT" >> "$GITHUB_OUTPUT"
            echo "::notice::$COUNT new upstream commits. $PATCH_COUNT PageUp patches to rebase."
          fi

      - name: Collect upstream commit log
        if: steps.check.outputs.up_to_date == 'false'
        id: commits
        run: |
          MERGE_BASE=$(git merge-base HEAD upstream/main)

          # Write log to a file — avoids GITHUB_OUTPUT size limits and shell quoting issues
          git log --oneline --no-merges "$MERGE_BASE"..upstream/main \
            | sed 's/^/- /' > /tmp/upstream-commits.md

          # Also store in output for the job summary (plain text, no backticks)
          {
            echo 'log<<EOF'
            cat /tmp/upstream-commits.md
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          SECURITY_HITS=$(git log --oneline "$MERGE_BASE"..upstream/main \
            | grep -ciE 'security|cve|vuln|advisory|exploit|credential' || true)
          echo "security_hits=$SECURITY_HITS" >> "$GITHUB_OUTPUT"

      - name: Rebase PageUp patches on upstream
        if: steps.check.outputs.up_to_date == 'false'
        id: rebase
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rebase upstream/main; then
            echo "result=success" >> "$GITHUB_OUTPUT"
          else
            git rebase --abort
            echo "result=conflict" >> "$GITHUB_OUTPUT"
          fi

      - name: Push rebased main
        if: steps.rebase.outputs.result == 'success'
        id: push
        run: |
          if git push --force-with-lease origin main 2>&1; then
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          else
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Force-push failed — likely missing SYNC_PAT or branch-protection bypass."
          fi

      - name: Create escalation PR on conflict
        if: steps.rebase.outputs.result == 'conflict'
        id: escalation_pr
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT || secrets.GITHUB_TOKEN }}
          COMMIT_COUNT: ${{ steps.check.outputs.commit_count }}
          PATCH_COUNT: ${{ steps.check.outputs.patch_count }}
          SECURITY_HITS: ${{ steps.commits.outputs.security_hits }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          BRANCH="auto/upstream-sync-$(date +%Y%m%d)"
          git checkout -b "$BRANCH" upstream/main

          if ! git push -u origin "$BRANCH" 2>&1; then
            echo "branch_pushed=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Could not push escalation branch (SYNC_PAT may be missing)."
            exit 0
          fi
          echo "branch_pushed=true" >> "$GITHUB_OUTPUT"

          # Build PR body in a temp file to avoid shell expansion issues
          {
            echo "## Upstream sync failed — rebase conflict"
            echo ""
            echo "**${COMMIT_COUNT}** new upstream commits could not be rebased"
            echo "under the **${PATCH_COUNT}** PageUp patches."
            if [ "$SECURITY_HITS" != "0" ]; then
              echo ""
              echo "### Security-relevant changes detected"
              echo ""
              echo "**${SECURITY_HITS}** commit(s) mention security keywords — review with priority."
            fi
            echo ""
            echo "### Upstream commits"
            echo ""
            cat /tmp/upstream-commits.md
            echo ""
            echo "### How to resolve"
            echo ""
            echo '```bash'
            echo "git fetch upstream main"
            echo "git checkout main"
            echo "git rebase upstream/main"
            echo "# resolve conflicts, then:"
            echo "git rebase --continue"
            echo "git push --force-with-lease origin main"
            echo '```'
            echo ""
            echo "Then close this PR (do **not** merge it via GitHub UI)."
            echo ""
            echo "---"
            echo "*Created by [sync-upstream](${RUN_URL})*"
          } > /tmp/pr-body.md

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --label upstream-sync \
            --title "chore: upstream sync conflict — manual rebase required" \
            --body-file /tmp/pr-body.md || true

      - name: Create issue as fallback notification
        if: |
          (steps.push.outputs.pushed == 'false') ||
          (steps.rebase.outputs.result == 'conflict' && steps.escalation_pr.outputs.branch_pushed == 'false')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REBASE_RESULT: ${{ steps.rebase.outputs.result }}
          COMMIT_COUNT: ${{ steps.check.outputs.commit_count }}
          PATCH_COUNT: ${{ steps.check.outputs.patch_count }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "$REBASE_RESULT" = "success" ]; then
            TITLE="chore: upstream sync — rebase succeeded but push failed"
            {
              echo "## Upstream sync rebase succeeded but could not push"
              echo ""
              echo "The rebase of **${PATCH_COUNT}** PageUp patches on"
              echo "**${COMMIT_COUNT}** new upstream commits succeeded,"
              echo "but the force-push to \`main\` failed."
              echo ""
              echo "**Most likely cause:** missing \`SYNC_PAT\` secret or branch-protection bypass."
              echo ""
              echo "### Setup required"
              echo ""
              echo "1. Create a PAT with \`repo\` + \`workflow\` scopes"
              echo "2. Add it as repo secret \`SYNC_PAT\`"
              echo "3. Add a branch-protection bypass for the PAT owner (Settings > Rules > Rulesets)"
              echo ""
              echo "### Manual sync"
              echo ""
              echo '```bash'
              echo "git fetch upstream main"
              echo "git checkout main"
              echo "git rebase upstream/main"
              echo "git push --force-with-lease origin main"
              echo '```'
              echo ""
              echo "### Upstream commits"
              echo ""
              cat /tmp/upstream-commits.md
              echo ""
              echo "---"
              echo "*Created by [sync-upstream](${RUN_URL})*"
            } > /tmp/issue-body.md
          else
            TITLE="chore: upstream sync conflict — manual rebase required"
            {
              echo "## Upstream sync failed — rebase conflict"
              echo ""
              echo "**${COMMIT_COUNT}** new upstream commits could not be rebased"
              echo "under the **${PATCH_COUNT}** PageUp patches."
              echo ""
              echo "Could not create a PR because pushing the escalation branch failed"
              echo "(missing \`SYNC_PAT\` secret — the \`GITHUB_TOKEN\` cannot push workflow file changes)."
              echo ""
              echo "### How to resolve"
              echo ""
              echo '```bash'
              echo "git fetch upstream main"
              echo "git checkout main"
              echo "git rebase upstream/main"
              echo "# resolve conflicts, then:"
              echo "git rebase --continue"
              echo "git push --force-with-lease origin main"
              echo '```'
              echo ""
              echo "### Upstream commits"
              echo ""
              cat /tmp/upstream-commits.md
              echo ""
              echo "---"
              echo "*Created by [sync-upstream](${RUN_URL})*"
            } > /tmp/issue-body.md
          fi

          gh issue create \
            --label upstream-sync \
            --title "$TITLE" \
            --body-file /tmp/issue-body.md || true

      - name: Job summary
        if: always() && steps.check.outputs.up_to_date == 'false'
        env:
          REBASE_RESULT: ${{ steps.rebase.outputs.result }}
          PUSH_RESULT: ${{ steps.push.outputs.pushed }}
          COMMIT_COUNT: ${{ steps.check.outputs.commit_count }}
          PATCH_COUNT: ${{ steps.check.outputs.patch_count }}
          SECURITY_HITS: ${{ steps.commits.outputs.security_hits }}
        run: |
          if [ "$REBASE_RESULT" = "success" ] && [ "$PUSH_RESULT" = "true" ]; then
            echo "### Rebased ${PATCH_COUNT} PageUp patches on ${COMMIT_COUNT} new upstream commits" >> "$GITHUB_STEP_SUMMARY"
          elif [ "$REBASE_RESULT" = "success" ] && [ "$PUSH_RESULT" = "false" ]; then
            echo "### Rebase succeeded but push failed — issue created" >> "$GITHUB_STEP_SUMMARY"
          elif [ "$REBASE_RESULT" = "conflict" ]; then
            echo "### Rebase conflict — escalation PR/issue created" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "$SECURITY_HITS" != "0" ] && [ -n "$SECURITY_HITS" ]; then
            echo "**${SECURITY_HITS} security-relevant commit(s)**" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f /tmp/upstream-commits.md ]; then
            cat /tmp/upstream-commits.md >> "$GITHUB_STEP_SUMMARY"
          fi
